<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enlist - Wasteland Scavenger</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<script src="nav.js"></script>
<main class="page-wrap">
  <h1 class="page-title">☢ Enlist</h1>
  <p class="page-sub">Create your survivor</p>
  <div style="max-width:460px;">
    <div class="card card-yellow">
      <div class="card-title">New Survivor</div>
      <div id="reg-msg" class="alert" style="display:none;"></div>
      <div class="form-group">
        <label class="label">Callsign (Username)</label>
        <input class="input" id="reg-name" type="text" placeholder="e.g. GhostWalker" />
      </div>
      <div class="form-group">
        <label class="label">Email</label>
        <input class="input" id="reg-email" type="email" placeholder="you@wasteland.com" />
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input class="input" id="reg-pass" type="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label class="label">Starting Faction</label>
        <select class="select" id="reg-faction">
          <option value="">Choose faction...</option>
          <option value="Raiders">Raiders</option>
          <option value="Settlers">Settlers</option>
          <option value="Brotherhood">Brotherhood</option>
          <option value="Nomads">Nomads</option>
        </select>
      </div>
      <button class="btn btn-yellow" id="reg-btn" style="width:100%;justify-content:center;">
        Register Survivor
      </button>
      <p style="margin-top:14px; font-family:var(--font-mono); font-size:12px; color:var(--text-dim);">
        Already enlisted? <a href="profile.html">View your profile</a>
      </p>
    </div>
  </div>
</main>

<script>
  document.getElementById("reg-btn").addEventListener("click", async function () {
    var name    = document.getElementById("reg-name").value.trim();
    var email   = document.getElementById("reg-email").value.trim();
    var pass    = document.getElementById("reg-pass").value;
    var faction = document.getElementById("reg-faction").value;
    var msg     = document.getElementById("reg-msg");
    var btn     = document.getElementById("reg-btn");

    // ── Basic validation ──────────────────────────────────────
    if (!name || !email || !pass || !faction) {
      showMsg("All fields are required.", "red");
      return;
    }
    if (pass.length < 6) {
      showMsg("Password must be at least 6 characters.", "red");
      return;
    }

    // ── Disable button so they can't double-submit ────────────
    btn.disabled = true;
    btn.textContent = "Enlisting...";

    try {
      // ── POST to your Express backend → saves to users.json ──
      const response = await fetch("/api/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username:  name,
          email:     email,
          password:  pass,
          faction:   faction,
          role:      "user",
          caps:      100,          // starting currency
          level:     1,
          createdAt: new Date().toISOString()
        })
      });

      const data = await response.json();

      // ── Handle duplicate username/email errors from server ──
      if (!response.ok) {
        showMsg(data.error || "Registration failed. Try again.", "red");
        btn.disabled = false;
        btn.textContent = "Register Survivor";
        return;
      }

      // ── Success: also save to localStorage so profile page loads fast ──
      localStorage.setItem("currentUser", JSON.stringify(data));

      showMsg("Welcome, " + name + "! Redirecting...", "green");
      setTimeout(function () { window.location.href = "profile.html"; }, 1200);

    } catch (err) {
      showMsg("Server error — is the server running?", "red");
      btn.disabled = false;
      btn.textContent = "Register Survivor";
    }
  });

  function showMsg(text, type) {
    var msg = document.getElementById("reg-msg");
    msg.textContent = text;
    msg.className = "alert " + type;
    msg.style.display = "block";
  }
</script>
</body>
</html>
