<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Over — Wasteland Scavenger</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .gameover-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--nav-height));
      text-align: center;
      gap: 20px;
    }
    .gameover-symbol {
      font-size: 80px;
      color: var(--clr-red);
      filter: drop-shadow(0 0 20px var(--clr-red));
      animation: flicker 2s infinite;
    }
    .gameover-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 8vw, 72px);
      color: var(--clr-red);
      text-shadow: 0 0 30px var(--clr-red);
      letter-spacing: 0.2em;
    }
    .gameover-sub {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--clr-text-dim);
      letter-spacing: 0.1em;
      max-width: 440px;
    }
    .gameover-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body class="page--gameover">

  <script src="nav.js"></script>

  <div class="nav-spacer"></div>
  <div class="gameover-screen animate-fade-in">
    <div class="gameover-symbol">☠</div>
    <h1 class="gameover-title">GAME OVER</h1>
    <p class="gameover-sub" id="gameover-reason">
      Your bunker has fallen silent.<br>The wasteland claims another soul.
    </p>
    <div class="gameover-actions">
      <a href="register.html" class="btn btn--primary">▶ Try Again</a>
      <a href="index.html" class="btn btn--ghost">← Return to Bunker</a>
    </div>
  </div>

  <script>
    // Allow other pages to pass a reason via URL param: ?reason=starvation
    const params = new URLSearchParams(window.location.search);
    const reason = params.get("reason");
    if (reason) {
      document.getElementById("gameover-reason").textContent =
        `Cause of death: ${decodeURIComponent(reason)}`;
    }
  </script>

</body>
</html>
